<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>All Certificates</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>All Certificates</h1>
    
    <div id="controls">
        <input type="text" id="search-number" placeholder="Search by number" />
    
        <select id="filter-type">
            <option value="">All types</option>
            <option value="Declaration of conformity">Declaration of conformity</option>
            <option value="Green passport">Green passport</option>
            <option value="Type approval">Type approval</option>
            <option value="Product certificate">Product certificate</option>
        </select>
    </div>
    
    <table id="cert-table">
        <thead>
            <tr>
                <th>Type</th>
                <th>Number</th>
                <th>Notified body</th>
                <th>Date of issue</th>
                <th>Expiry date</th>
                <th>File</th>
            </tr>
        </thead>
        
        <tbody>
        
        </tbody>
    </table>
    
    <a href="/">&larr; Back to upload</a>
    <script src="/certificates.js"></script>
</body>
</html>
